<?xml version="1.0" encoding="UTF-8"?>
<!--
  Aether logo — represents:
    • Central core      = autonomous intelligence
    • Three arcs        = three layers (perceive · reason · act)
    • Orbital nodes     = adaptive connections to ERP modules
    • Radiating field   = constant awareness
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="Aether">
  <defs>
    <linearGradient id="aev-core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="aev-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#10b981"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <radialGradient id="aev-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#10b981" stop-opacity=".55"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft glow halo -->
  <circle cx="32" cy="32" r="30" fill="url(#aev-glow)"/>

  <!-- outer ring (awareness boundary) -->
  <circle cx="32" cy="32" r="26" stroke="url(#aev-ring)" stroke-width="1.4" stroke-dasharray="3 3" stroke-opacity=".55"/>

  <!-- middle arc (rotated -45°) -->
  <path d="M 12 22 A 18 18 0 1 1 52 42" stroke="url(#aev-ring)" stroke-width="2" stroke-linecap="round"/>

  <!-- inner arc (rotated +45°) -->
  <path d="M 18 46 A 14 14 0 1 1 46 18" stroke="url(#aev-core)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- orbital nodes (perceive · reason · act) -->
  <circle cx="32" cy="6"  r="2.4" fill="#10b981"/>
  <circle cx="56" cy="44" r="2.2" fill="#7c3aed"/>
  <circle cx="8"  cy="42" r="2.2" fill="#06b6d4"/>

  <!-- core consciousness -->
  <circle cx="32" cy="32" r="9" fill="url(#aev-core)"/>
  <circle cx="32" cy="32" r="3.2" fill="#fff"/>
</svg>
