<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1"/>
    <meta name="theme-color" content="#000000"/>
    <meta name="description" content="Dhrub Foundation ERP System"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    <title>Dhrub Foundation ERP</title>
    <script defer="defer" src="static/js/main.be26a0f2.js"></script>
    <link href="static/css/main.5d4a45a1.css" rel="stylesheet">
    <link href="static/css/responsive.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="/favicon.png">

    <style>
        /* ── CMS Floating Action Button ── */
        .cms-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }
        .cms-fab-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            color: white;
            padding: 14px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 20px rgba(5, 150, 105, 0.4);
            transition: all 0.3s ease;
        }
        .cms-fab-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(5, 150, 105, 0.5);
        }
        .cms-fab-btn i { font-size: 1.1rem; }

        @media (max-width: 768px) {
            .cms-fab-btn span { display: none; }
            .cms-fab-btn { padding: 16px; border-radius: 50%; }
        }

        /* ── Aether FAB ── */
        #aether-fab {
            position: fixed;
            bottom: 96px;
            right: 24px;
            z-index: 10000;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-radius: 50%;
            font-size: 28px;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.45);
            border: none;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #aether-fab:hover {
            transform: scale(1.1);
            box-shadow: 0 14px 30px rgba(16, 185, 129, 0.55);
        }

        /* ── Aether Chat Window ── */
        #aether-window {
            position: fixed;
            bottom: 176px;
            right: 24px;
            width: 380px;
            height: 560px;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.18);
            z-index: 10001;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: opacity 0.25s ease, transform 0.25s ease;
            font-family: 'Outfit', sans-serif;
        }
        #aether-window.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(12px) scale(0.97);
        }

        /* Header */
        #aether-header {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }
        #aether-header .info { display: flex; align-items: center; gap: 12px; }
        #aether-header .title { font-weight: 600; font-size: 1rem; }
        #aether-header .subtitle { font-size: 0.75rem; opacity: 0.85; }
        #aether-close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            padding: 0 4px;
            opacity: 0.85;
            transition: opacity 0.2s;
        }
        #aether-close-btn:hover { opacity: 1; }

        /* Messages */
        #aether-messages {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            background: #f8fafc;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #aether-messages::-webkit-scrollbar { width: 4px; }
        #aether-messages::-webkit-scrollbar-track { background: transparent; }
        #aether-messages::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .aether-msg { display: flex; }
        .aether-msg.user  { justify-content: flex-end; }
        .aether-msg.bot   { justify-content: flex-start; }

        .aether-bubble {
            max-width: 80%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 0.88rem;
            line-height: 1.5;
            word-break: break-word;
        }
        .aether-msg.user .aether-bubble {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border-bottom-right-radius: 4px;
        }
        .aether-msg.bot .aether-bubble {
            background: white;
            color: #1e293b;
            border: 1px solid #e2e8f0;
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }

        /* Typing indicator */
        .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
        .typing-dots span {
            width: 7px; height: 7px;
            background: #94a3b8;
            border-radius: 50%;
            animation: blink 1.2s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* Input area */
        #aether-input-area {
            padding: 14px 16px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            background: white;
            flex-shrink: 0;
        }
        #aether-input {
            flex: 1;
            padding: 12px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 9999px;
            outline: none;
            font-size: 0.88rem;
            font-family: inherit;
            transition: border-color 0.2s;
            color: #1e293b;
        }
        #aether-input:focus { border-color: #10b981; }
        #aether-send-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            padding: 0 22px;
            border-radius: 9999px;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.2s;
            font-family: inherit;
        }
        #aether-send-btn:hover { opacity: 0.9; transform: scale(1.04); }
        #aether-send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        @media (max-width: 480px) {
            #aether-window { width: calc(100vw - 32px); right: 16px; bottom: 160px; }
            #aether-fab    { right: 16px; bottom: 88px; }
            .cms-fab       { right: 16px; }
        }
    </style>
</head>
<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <!-- ── CMS Floating Action Button ── -->
    <div class="cms-fab">
        <a href="cms/" class="cms-fab-btn" title="Content Management System">
            <i class="fas fa-edit"></i>
            <span>Manage Content (CMS)</span>
        </a>
    </div>

    <!-- ── Aether AI Chat Widget HTML Structure ── -->
    <button id="aether-fab" title="Chat with Aether AI">🤖</button>

    <div id="aether-window" class="hidden">
        <div id="aether-header">
            <div class="info">
                <span style="font-size:28px;">🤖</span>
                <div>
                    <div class="title">Aether</div>
                    <div class="subtitle">AI Office Assistant</div>
                </div>
            </div>
            <button id="aether-close-btn" title="Close">×</button>
        </div>
        <div id="aether-messages"></div>
        <div id="aether-input-area">
            <input id="aether-input" type="text" placeholder="Ask Aether anything…" autocomplete="off"/>
            <button id="aether-send-btn">Send</button>
        </div>
    </div>

    <!-- ── Aether AI Chat Widget JavaScript ── -->
    <script>
    (function () {
        // Wait for DOM to be fully loaded
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initAether);
        } else {
            initAether();
        }

        function initAether() {
            const fab        = document.getElementById('aether-fab');
            const win        = document.getElementById('aether-window');
            const closeBtn   = document.getElementById('aether-close-btn');
            const input      = document.getElementById('aether-input');
            const sendBtn    = document.getElementById('aether-send-btn');
            const msgBox     = document.getElementById('aether-messages');

            // Safety check - if elements don't exist, don't proceed
            if (!fab || !win || !closeBtn || !input || !sendBtn || !msgBox) {
                console.error('[Aether] Required DOM elements not found');
                return;
            }

            let isOpen = false;

            /* ── Toggle chat window ── */
            function toggle() {
                isOpen = !isOpen;
                win.classList.toggle('hidden', !isOpen);
                if (isOpen) {
                    input.focus();
                    if (msgBox.children.length === 0) {
                        appendMessage('bot', 'Hi! I\'m Aether, your AI office assistant. How can I help you today?');
                    }
                }
            }

            fab.addEventListener('click', toggle);
            closeBtn.addEventListener('click', toggle);

            /* ── Keyboard: Enter to send ── */
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            sendBtn.addEventListener('click', sendMessage);

            /* ── Append a message bubble ── */
            function appendMessage(role, text) {
                const row    = document.createElement('div');
                row.className = 'aether-msg ' + role;
                const bubble = document.createElement('div');
                bubble.className = 'aether-bubble';
                bubble.textContent = text;
                row.appendChild(bubble);
                msgBox.appendChild(row);
                msgBox.scrollTop = msgBox.scrollHeight;
                return bubble;
            }

            /* ── Show / remove typing indicator ── */
            function showTyping() {
                const row    = document.createElement('div');
                row.className = 'aether-msg bot';
                row.id = 'aether-typing';
                const bubble = document.createElement('div');
                bubble.className = 'aether-bubble';
                bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
                row.appendChild(bubble);
                msgBox.appendChild(row);
                msgBox.scrollTop = msgBox.scrollHeight;
            }
            function removeTyping() {
                const t = document.getElementById('aether-typing');
                if (t) t.remove();
            }

            /* ── Send message to Aether API ── */
            async function sendMessage() {
                const text = input.value.trim();
                if (!text) return;

                appendMessage('user', text);
                input.value = '';
                sendBtn.disabled = true;
                showTyping();

                try {
                    const res = await fetch('/dhrub_erp/aether/api/aether', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: text })
                    });

                    removeTyping();

                    if (!res.ok) {
                        throw new Error('Server returned ' + res.status);
                    }

                    const data = await res.json();

                    const reply =
                        (typeof data === 'string' ? data : null) ||
                        data.reply || data.response || data.message || data.answer ||
                        (data.content && data.content[0] && data.content[0].text) ||
                        'I received your message but couldn\'t parse the response.';

                    appendMessage('bot', reply);

                } catch (err) {
                    removeTyping();
                    console.error('[Aether]', err);
                    appendMessage('bot', '⚠️ Sorry, I couldn\'t reach the server right now. Please try again in a moment.');
                } finally {
                    sendBtn.disabled = false;
                    input.focus();
                }
            }
        }
    })();
    </script>
</body>
</html>
